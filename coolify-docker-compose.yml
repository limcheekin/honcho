# Honcho Docker Compose
#
# Usage:
#   cp docker-compose.yml.example docker-compose.yml
#   cp .env.template .env  # edit with your provider config
#   docker compose up -d --build
#
# By default, ports are bound to 127.0.0.1 (localhost only).
# For development, uncomment the source mounts and monitoring services below.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: [ "sh", "docker/entrypoint.sh" ]
    ports:
      - "127.0.0.1:8001:8000"
    # -- Development: mount source for live reload --
    # volumes:
    #   - .:/app
    #   - venv:/app/.venv
    environment:
      - DB_CONNECTION_URI=${DB_CONNECTION_URI:-postgresql+psycopg://postgres:postgres@database:5432/postgres}
      - CACHE_URL=${CACHE_URL:-redis://redis:6379/0?suppress=true}
      - CACHE_ENABLED=true
    env_file:
      - /home/limcheekin/docker/volumes/honcho/.env
    restart: unless-stopped

  deriver:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: [ "/app/.venv/bin/python", "-m", "src.deriver" ]
    # -- Development: mount source for live reload --
    # volumes:
    #   - .:/app
    #   - venv:/app/.venv
    environment:
      - DB_CONNECTION_URI=${DB_CONNECTION_URI:-postgresql+psycopg://postgres:postgres@database:5432/postgres}
      - CACHE_URL=${CACHE_URL:-redis://redis:6379/0?suppress=true}
      - CACHE_ENABLED=true
    env_file:
      - /home/limcheekin/docker/volumes/honcho/.env
    restart: unless-stopped
